name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone UA Rust dependency
        run: git clone --depth 1 https://github.com/jinzechen/Understand_Anything_Rust.git ../Understand_Anything_Rust

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: cargo check
        run: cargo check

      - name: cargo test
        run: cargo test --lib

      - name: cargo clippy
        run: cargo clippy -- -D warnings || true

      - name: cargo fmt
        run: cargo fmt --check || true

  android:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Clone UA Rust dependency
        run: git clone --depth 1 https://github.com/jinzechen/Understand_Anything_Rust.git ../Understand_Anything_Rust

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android NDK
        run: |
          NDK_URL="https://dl.google.com/android/repository/android-ndk-r26b-linux.zip"
          curl -L --retry 3 -o ndk.zip "$NDK_URL"
          unzip -q ndk.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r26b" >> $GITHUB_ENV

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Android .so
        run: |
          cargo ndk --target aarch64-linux-android --platform 26 build --release

      - name: Upload .so artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-operit-android
          path: target/aarch64-linux-android/release/libhermes_operit_core.so
