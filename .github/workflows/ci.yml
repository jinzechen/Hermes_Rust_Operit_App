name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Clone Understand_Anything_Rust dependency (path dep)
      - name: Clone UA Rust dependency
        run: |
          git clone https://github.com/jinzechen/Understand_Anything_Rust.git ../Understand_Anything_Rust

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - run: cargo test --lib
      - run: cargo clippy -- -D warnings 2>&1 || true
      - run: cargo fmt --check
