name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone UA Rust dependency
        run: git clone --depth 1 https://github.com/jinzechen/Understand_Anything_Rust.git ../Understand_Anything_Rust
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            ../Understand_Anything_Rust -> target
      - name: cargo check
        run: cargo check
      - name: cargo test
        run: cargo test --lib
      - name: cargo clippy
        run: cargo clippy -- -D warnings || true
      - name: cargo fmt
        run: cargo fmt --check || true

  android-apk:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      - name: Clone UA Rust dependency
        run: git clone --depth 1 https://github.com/jinzechen/Understand_Anything_Rust.git ../Understand_Anything_Rust
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup Android SDK
        run: |
          curl -L -o cmdline.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline.zip
          mkdir -p android-sdk/cmdline-tools/latest
          mv cmdline-tools/* android-sdk/cmdline-tools/latest/
          export ANDROID_SDK_ROOT=$PWD/android-sdk
          yes | android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "build-tools;34.0.0" "platforms;android-34" "platforms;android-30" "platform-tools" "ndk;26.1.10909125" 2>/dev/null
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV
      - name: Build APK
        run: |
          keytool -genkey -v -keystore debug.keystore -storepass android -keypass android \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Debug, OU=Hermes, O=Operit, L=Shanghai, ST=Shanghai, C=CN" 2>/dev/null
          # Compile Java WebViewHelper to DEX
          mkdir -p target/java_classes
          javac -source 11 -target 11 -d target/java_classes \
            -cp "$ANDROID_HOME/platforms/android-34/android.jar" \
            src/android/java/com/operit/hermes/WebViewHelper.java \
            || { echo "javac FAILED"; exit 1; }
          ls -la target/java_classes/com/operit/hermes/
          $ANDROID_HOME/build-tools/34.0.0/d8 \
            --lib "$ANDROID_HOME/platforms/android-34/android.jar" \
            --output target/java_classes/ \
            target/java_classes/com/operit/hermes/WebViewHelper.class \
            || { echo "d8 FAILED"; exit 1; }
          ls -la target/java_classes/classes.dex
          # Build APK
          cargo install cargo-apk
          cargo apk build --lib
          # Inject classes.dex into APK
          APK=$(ls target/debug/apk/*.apk | head -1)
          cp "$APK" "$APK.tmp"
          (cd target/java_classes && zip -q "../../$APK.tmp" classes.dex) || { echo "zip FAILED"; exit 1; }
          mv "$APK.tmp" "$APK"
          # Re-sign after modification
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks debug.keystore \
            --ks-pass pass:android --key-pass pass:android "$APK" \
            || { echo "apksigner FAILED"; exit 1; }
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hermes-operit-debug-apk
          path: target/debug/apk/HermesOperit.apk
