name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone UA Rust dependency
        run: git clone --depth 1 https://github.com/jinzechen/Understand_Anything_Rust.git ../Understand_Anything_Rust

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: cargo check
        run: cargo check

      - name: cargo test
        run: cargo test --lib

      - name: cargo clippy
        run: cargo clippy -- -D warnings || true

      - name: cargo fmt
        run: cargo fmt --check || true
