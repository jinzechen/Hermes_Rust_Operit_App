name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ══════════════════════════════════════════════════════
  # 测试 + 静态检查
  # ══════════════════════════════════════════════════════
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --all-features
      - run: cargo clippy -- -D warnings
      - run: cargo fmt --check

  # ══════════════════════════════════════════════════════
  # Android APK 构建 (aarch64)
  # ══════════════════════════════════════════════════════
  build-android:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125'

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build native library (.so)
        run: |
          cargo ndk \
            --target aarch64-linux-android \
            --platform 26 \
            --output-dir android/app/src/main/jniLibs \
            build --release

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hermes-operit-release
          path: android/app/build/outputs/apk/release/*.apk

  # ══════════════════════════════════════════════════════
  # MCP 插件交叉编译 (aarch64-musl 全静态)
  # ══════════════════════════════════════════════════════
  build-plugins:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        plugin: [obscura, agentic_vision, filesystem, typemill, sherpa]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross

      - name: Cross-compile plugin
        run: |
          cross build \
            --target aarch64-unknown-linux-musl \
            --release \
            -p ${{ matrix.plugin }}

      - name: Package plugin ZIP
        run: |
          mkdir -p dist/${{ matrix.plugin }}
          cp target/aarch64-unknown-linux-musl/release/${{ matrix.plugin }} dist/${{ matrix.plugin }}/binary
          cp index.js dist/${{ matrix.plugin }}/index.js 2>/dev/null || true
          cp package.json dist/${{ matrix.plugin }}/package.json 2>/dev/null || true
          cd dist && zip -r ${{ matrix.plugin }}.zip ${{ matrix.plugin }}/

      - name: Upload plugin
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.plugin }}
          path: dist/${{ matrix.plugin }}.zip
